on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1. Checkout do repositório
      - name: Check out repository
        uses: actions/checkout@v4

      # 2. Instala R
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5"
          use-public-rspm: true

      # 3. Restaura pacotes via renv
      - name: Restore R packages (renv)
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      # 4. Instala Quarto
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # 5. Instala TinyTeX com autenticação (evita erro 403)
      - name: Install TinyTeX (PDF support)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: quarto install tool tinytex --update-path

      # 6. Instala suporte de idioma português no TeX Live (corrige erro babel brazilian)
      - name: Install TeX language packages (Portuguese)
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-lang-portuguese texlive-latex-extra

      # 7. Renderiza e publica no gh-pages
      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
